<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Animation Preview</title>
<style>
    body {
        margin: 0;
        background: #17212c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
        color: #fff;
    }
    .label { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; color: #80cbc4; }
    .counter { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-bottom: 32px; letter-spacing: 0.08em; }
    .bug-stage {
        background: #17212c;
        border: 2px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 40px 70px 70px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        overflow: visible;
    }
    .bug-stage::after {
        content: '';
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 48px;
        background: #2b3440;
        border-top: 2px solid rgba(255,255,255,0.1);
        border-radius: 0 0 10px 10px;
        pointer-events: none;
    }
    .bug-svg { width: 180px; height: auto; overflow: visible; filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.4)); position: relative; z-index: 2; }

    @keyframes bug-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    .bug-body-group { animation: bug-bob 2s ease-in-out infinite; }

    @keyframes cursor-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .t-cursor { animation: cursor-blink 0.9s step-end infinite; }
    @keyframes type-grow { 0% { stroke-dashoffset: 30; } 55%, 100% { stroke-dashoffset: 0; } }
    .t-line-a { stroke-dasharray: 30; animation: type-grow 2.2s ease-out infinite; }

    @keyframes page-turn { 0%, 15% { transform: scaleX(1); } 35% { transform: scaleX(0); } 65% { transform: scaleX(0); } 85%, 100% { transform: scaleX(1); } }
    .r-page { transform-box: fill-box; transform-origin: left center; animation: page-turn 3s ease-in-out infinite; }

    @keyframes steam-rise { 0% { transform: translateY(0); opacity: 0.8; } 100% { transform: translateY(-10px); opacity: 0; } }
    .te-s1 { transform-box: fill-box; animation: steam-rise 1.8s ease-out 0s infinite; }
    .te-s2 { transform-box: fill-box; animation: steam-rise 1.8s ease-out 0.6s infinite; }

    @keyframes drop-fall { 0% { transform: translateY(0); opacity: 1; } 65% { transform: translateY(10px); opacity: 0; } 66% { transform: translateY(0); opacity: 0; } 80%, 100% { transform: translateY(0); opacity: 1; } }
    .w-d1 { transform-box: fill-box; animation: drop-fall 1.1s ease-in 0s infinite; }
    .w-d2 { transform-box: fill-box; animation: drop-fall 1.1s ease-in 0.22s infinite; }
    .w-d3 { transform-box: fill-box; animation: drop-fall 1.1s ease-in 0.44s infinite; }

    @keyframes pencil-scratch { 0% { transform: translate(0,0) rotate(0deg); } 55% { transform: translate(24px,0) rotate(1.5deg); } 70%, 100% { transform: translate(0,0) rotate(0deg); } }
    .wr-pencil { transform-box: fill-box; animation: pencil-scratch 1.7s ease-in-out infinite; }
    @keyframes line-appear { 0% { stroke-dashoffset: 24; } 60%, 100% { stroke-dashoffset: 0; } }
    .wr-line { stroke-dasharray: 24; animation: line-appear 1.7s ease-out infinite; }

    @keyframes sweep-swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
    .sw-broom { transform-box: fill-box; transform-origin: right top; animation: sweep-swing 1.2s ease-in-out infinite; }
    @keyframes dust-drift-a { 0% { transform: translate(0,0); opacity: 0.8; } 100% { transform: translate(-14px,5px); opacity: 0; } }
    @keyframes dust-drift-b { 0% { transform: translate(0,0); opacity: 0.7; } 100% { transform: translate(-10px,9px); opacity: 0; } }
    @keyframes dust-drift-c { 0% { transform: translate(0,0); opacity: 0.6; } 100% { transform: translate(-12px,3px); opacity: 0; } }
    .sw-d1 { transform-box: fill-box; animation: dust-drift-a 1.5s ease-out 0s infinite; }
    .sw-d2 { transform-box: fill-box; animation: dust-drift-b 1.5s ease-out 0.5s infinite; }
    .sw-d3 { transform-box: fill-box; animation: dust-drift-c 1.5s ease-out 1.0s infinite; }

    @keyframes leg-wave { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
    .leg-ul { transform-box: fill-box; transform-origin: right center; animation: leg-wave 1.6s ease-in-out 0s infinite; }
    .leg-ml { transform-box: fill-box; transform-origin: right center; animation: leg-wave 1.6s ease-in-out 0.27s infinite; }
    .leg-ll { transform-box: fill-box; transform-origin: right center; animation: leg-wave 1.6s ease-in-out 0.53s infinite; }
    .leg-ur { transform-box: fill-box; transform-origin: left center; animation: leg-wave 1.6s ease-in-out 0.8s infinite; }
    .leg-mr { transform-box: fill-box; transform-origin: left center; animation: leg-wave 1.6s ease-in-out 1.07s infinite; }
    .leg-lr { transform-box: fill-box; transform-origin: left center; animation: leg-wave 1.6s ease-in-out 1.33s infinite; }

    @keyframes sort-swap-bottom { 0%, 15% { transform: translateY(0); } 40%, 65% { transform: translateY(-24px); } 85%, 100% { transform: translateY(0); } }
    @keyframes sort-swap-top { 0%, 15% { transform: translateY(0); } 40%, 65% { transform: translateY(24px); } 85%, 100% { transform: translateY(0); } }
    @keyframes sort-shift-mid { 0%, 20%, 80%, 100% { transform: translateY(0); } 45%, 60% { transform: translateY(-4px); } }
    .so-p1 { transform-box: fill-box; animation: sort-swap-bottom 4s ease-in-out 0s infinite; }
    .so-p2 { transform-box: fill-box; animation: sort-shift-mid 4s ease-in-out 0.15s infinite; }
    .so-p3 { transform-box: fill-box; animation: sort-shift-mid 4s ease-in-out 0.1s infinite; }
    .so-p4 { transform-box: fill-box; animation: sort-swap-top 4s ease-in-out 0s infinite; }

    @keyframes brush-stroke { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-5px,-3px); } 45% { transform: translate(-3px,4px); } 70% { transform: translate(4px,-2px); } }
    .pa-brush { transform-box: fill-box; animation: brush-stroke 1.5s ease-in-out infinite; }
    .pa-easel-back { transform-box: fill-box; transform-origin: center center; }
    .pa-easel-front { transform-box: fill-box; transform-origin: center center; transform: scaleX(0); }

    .controls { display: flex; gap: 16px; margin-top: 40px; align-items: center; }
    button { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; font-family: monospace; font-size: 1rem; font-weight: 700; padding: 10px 28px; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.15s; }
    button:hover { background: rgba(255,255,255,0.15); }
    .hint { margin-top: 20px; font-size: 0.68rem; color: rgba(255,255,255,0.3); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="label" id="anim-label">typing</div>
<div class="counter" id="anim-counter">1 / 8</div>
<div class="bug-stage"><div id="bug-slot"></div></div>
<div class="controls">
    <button onclick="prev()">← Prev</button>
    <button onclick="next()">Next →</button>
</div>
<p class="hint">← → arrow keys also work</p>
<script>
const PAINTING_PICTURES = [
    `<rect x="26" y="76" width="26" height="22" fill="#87CEEB"/>
     <rect x="26" y="87" width="26" height="11" fill="#4CAF50"/>
     <ellipse cx="44" cy="81" rx="4" ry="4" fill="#FDD835"/>
     <ellipse cx="30" cy="88" rx="6" ry="4" fill="#388E3C"/>`,
    `<rect x="26" y="76" width="26" height="22" fill="#E3F2FD"/>
     <rect x="32" y="86" width="14" height="12" fill="#FFCC80"/>
     <polygon points="28,86 52,86 39,78" fill="#C62828"/>
     <rect x="37" y="91" width="5" height="7" fill="#6D4C41"/>
     <rect x="29" y="83" width="5" height="4" fill="#81D4FA"/>`,
    `<rect x="26" y="76" width="26" height="22" fill="#F1F8E9"/>
     <line x1="39" y1="97" x2="39" y2="82" stroke="#388E3C" stroke-width="2"/>
     <ellipse cx="34" cy="88" rx="5" ry="2.5" fill="#66BB6A" transform="rotate(-30 34 88)"/>
     <ellipse cx="44" cy="86" rx="5" ry="2.5" fill="#66BB6A" transform="rotate(30 44 86)"/>
     <circle cx="39" cy="79" r="4" fill="#E91E63"/>
     <circle cx="39" cy="79" r="2" fill="#FFF176"/>`,
    `<rect x="26" y="76" width="26" height="22" fill="#212121"/>
     <rect x="26" y="76" width="9" height="11" fill="#E91E63"/>
     <rect x="35" y="76" width="8" height="11" fill="#FF9800"/>
     <rect x="43" y="76" width="9" height="11" fill="#2196F3"/>
     <rect x="26" y="87" width="13" height="11" fill="#9C27B0"/>
     <rect x="39" y="87" width="13" height="11" fill="#4CAF50"/>`,

const ACTIVITIES = [
    { id: 'typing', label: 'typing', prop: `
        <rect x="13" y="73" width="54" height="11" rx="2" fill="#232323" stroke="#3a3a3a" stroke-width="1.5"/>
        <line x1="16" y1="78" x2="64" y2="78" stroke="#3a3a3a" stroke-width="1"/>
        <rect x="22" y="81" width="36" height="2" rx="1" fill="#3a3a3a"/>
        <rect x="28" y="84" width="24" height="2" rx="1" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
        <rect x="16" y="86" width="48" height="16" rx="2" fill="#1a2535" stroke="#3a3a3a" stroke-width="1.5"/>
        <rect x="18" y="88" width="44" height="12" rx="1" fill="#0d1520"/>
        <line class="t-line-a" x1="21" y1="92" x2="51" y2="92" stroke="#80cbc4" stroke-width="1.3"/>
        <rect class="t-cursor" x="52" y="90.5" width="1.5" height="3" fill="#80cbc4"/>
        <line x1="21" y1="97" x2="40" y2="97" stroke="#2a3a4a" stroke-width="1"/>
    ` },
    { id: 'reading', label: 'reading', prop: `
        <rect x="17" y="76" width="18" height="26" rx="1" fill="#2a2a2a" stroke="#404040" stroke-width="1.5"/>
        <line x1="20" y1="83" x2="32" y2="83" stroke="#505050" stroke-width="1.5"/>
        <line x1="20" y1="88" x2="32" y2="88" stroke="#505050" stroke-width="1.5"/>
        <line x1="20" y1="93" x2="32" y2="93" stroke="#505050" stroke-width="1.5"/>
        <rect x="35" y="75" width="10" height="28" rx="1" fill="#1a1a1a" stroke="#353535" stroke-width="1.5"/>
        <rect x="45" y="76" width="18" height="26" rx="1" fill="#1e1e1e" stroke="#404040" stroke-width="1.5"/>
        <g class="r-page">
            <rect x="46" y="77" width="16" height="24" rx="0.5" fill="#303030"/>
            <line x1="48" y1="83" x2="60" y2="83" stroke="#505050" stroke-width="1.5"/>
            <line x1="48" y1="88" x2="60" y2="88" stroke="#505050" stroke-width="1.5"/>
            <line x1="48" y1="93" x2="60" y2="93" stroke="#505050" stroke-width="1.5"/>
        </g>
    ` },
    { id: 'tea', label: 'tea break', prop: `
        <rect x="25" y="79" width="26" height="20" rx="2" fill="#4a3f35" stroke="#5a4f45" stroke-width="1.5"/>
        <rect x="24" y="77" width="28" height="4" rx="2" fill="#5a4f45" stroke="#6a5f55" stroke-width="1.5"/>
        <path d="M51 82 Q61 87 51 95" fill="none" stroke="#4a3f35" stroke-width="4" stroke-linecap="round"/>
        <path d="M51 82 Q59 87 51 95" fill="none" stroke="#5a4f45" stroke-width="2" stroke-linecap="round"/>
        <path class="te-s1" d="M35 75 Q38 70 35 65" fill="none" stroke="#7a7a7a" stroke-width="2.5" stroke-linecap="round"/>
        <path class="te-s2" d="M43 75 Q46 70 43 65" fill="none" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
    ` },
    { id: 'watering', label: 'watering', prop: `
        <rect x="27" y="71" width="26" height="4" rx="2" fill="#455565"/>
        <rect x="22" y="74" width="36" height="18" rx="3" fill="#354555" stroke="#455565" stroke-width="1.5"/>
        <path d="M58 76 Q68 83 58 91" fill="none" stroke="#455565" stroke-width="3" stroke-linecap="round"/>
        <path d="M27 88 Q22 95 25 100" fill="none" stroke="#455565" stroke-width="3" stroke-linecap="round"/>
        <circle cx="25" cy="100" r="2" fill="#3a4a5a"/>
        <line class="w-d1" x1="23" y1="103" x2="22" y2="111" stroke="#5a8a9a" stroke-width="1.5" stroke-linecap="round"/>
        <line class="w-d2" x1="26" y1="102" x2="25" y2="110" stroke="#5a8a9a" stroke-width="1.5" stroke-linecap="round"/>
        <line class="w-d3" x1="29" y1="103" x2="28" y2="111" stroke="#5a8a9a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="26" y1="115" x2="26" y2="110" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
        <circle cx="26" cy="108" r="4" fill="#E91E63"/>
        <circle cx="26" cy="108" r="2" fill="#FFF176"/>
    ` },
    { id: 'writing', label: 'writing', prop: `
        <rect x="18" y="77" width="34" height="25" rx="1" fill="#1e1e1e" stroke="#383838" stroke-width="1.5"/>
        <line x1="21" y1="83" x2="49" y2="83" stroke="#383838" stroke-width="1.5"/>
        <line x1="21" y1="88" x2="49" y2="88" stroke="#383838" stroke-width="1.5"/>
        <line class="wr-line" x1="21" y1="93" x2="45" y2="93" stroke="#606060" stroke-width="1.5"/>
        <g class="wr-pencil">
            <line x1="36" y1="74" x2="21" y2="93" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round"/>
            <circle cx="21" cy="93" r="1.2" fill="#bdbdbd"/>
        </g>
    ` },
    { id: 'sweeping', label: 'sweeping', prop: `
        <g class="sw-broom">
            <line x1="52" y1="73" x2="28" y2="97" stroke="#6a5a4a" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="21" y1="90" x2="35" y2="104" stroke="#5a4a3a" stroke-width="4" stroke-linecap="round"/>
            <line x1="21" y1="90" x2="17" y2="94" stroke="#4a3a2a" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="24" y1="93" x2="20" y2="97" stroke="#4a3a2a" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="28" y1="97" x2="24" y2="101" stroke="#4a3a2a" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="31" y1="100" x2="27" y2="104" stroke="#4a3a2a" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="35" y1="104" x2="31" y2="108" stroke="#4a3a2a" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <circle class="sw-d1" cx="16" cy="109" r="2" fill="#c8b896" opacity="0.75"/>
        <circle class="sw-d2" cx="12" cy="112" r="1.5" fill="#c8b896" opacity="0.65"/>
        <circle class="sw-d3" cx="21" cy="111" r="1.5" fill="#c8b896" opacity="0.55"/>
    ` },
    { id: 'sorting', label: 'sorting', prop: `
        <rect class="so-p1" x="16" y="97" width="48" height="7" rx="1" fill="#F9A825" stroke="#c68900" stroke-width="1.5"/>
        <rect class="so-p2" x="18" y="89" width="44" height="7" rx="1" fill="#C62828" stroke="#8b0000" stroke-width="1.5"/>
        <rect class="so-p3" x="20" y="81" width="40" height="7" rx="1" fill="#00838F" stroke="#005662" stroke-width="1.5"/>
        <rect class="so-p4" x="22" y="73" width="36" height="7" rx="1" fill="#1565C0" stroke="#003c8f" stroke-width="1.5"/>
        <rect x="22" y="73" width="8" height="3" rx="1" fill="#fff" opacity="0.7"/>
    ` },
    { id: 'painting', label: 'painting', pictureIndex: 0, prop: `
        <g class="pa-brush">
            <line x1="55" y1="77" x2="38" y2="90" stroke="#9e9e9e" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="33" y="88" width="6" height="3" rx="1" fill="#E91E63" transform="rotate(-35 36 89)"/>
        </g>
    ` },
];

let current = 0;

function makePaintingEasel(pictureIndex) {
    return `
    <line x1="28" y1="100" x2="22" y2="113" stroke="#6a5a4a" stroke-width="2" stroke-linecap="round"/>
    <line x1="52" y1="100" x2="58" y2="113" stroke="#6a5a4a" stroke-width="2" stroke-linecap="round"/>
    <g class="pa-easel-back">
        <rect x="24" y="74" width="32" height="26" rx="1" fill="#8d6e40" stroke="#6a4f2a" stroke-width="1.5"/>
        <line x1="24" y1="87" x2="56" y2="87" stroke="#6a4f2a" stroke-width="1.5"/>
        <line x1="40" y1="74" x2="40" y2="100" stroke="#6a4f2a" stroke-width="1.5"/>
    </g>
    <g class="pa-easel-front">
        <rect x="24" y="74" width="32" height="26" rx="1" fill="#383838" stroke="#5a4a3a" stroke-width="1.5"/>
        ${PAINTING_PICTURES[pictureIndex % PAINTING_PICTURES.length]}
    </g>`;
}

function makeBugDots() {
    const n = 2 + Math.floor(Math.random() * 4);
    const dots = [];
    for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * 0.72;
        dots.push({
            x: +(40 + r * 23 * Math.cos(angle)).toFixed(1),
            y: +(61 + r * 21 * Math.sin(angle)).toFixed(1),
            r: +(1.8 + Math.random() * 2.4).toFixed(1),
        });
    }
    return dots;
}

function makeBugSVG(activity) {
    const extraSVG = activity.id === 'painting' ? makePaintingEasel(activity.pictureIndex ?? 0) : '';
    return `<svg class="bug-svg" viewBox="0 0 80 115" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="sg-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F05252"/>
      <stop offset="55%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#7f1111"/>
    </linearGradient>
  </defs>
  <g class="bug-body-group">
    <ellipse cx="40" cy="111" rx="24" ry="4" fill="#000" opacity="0.2"/>
    <line x1="31" y1="19" x2="18" y2="5" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <circle cx="17" cy="4" r="3.4" fill="#111"/>
    <line x1="49" y1="19" x2="62" y2="5" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <circle cx="63" cy="4" r="3.4" fill="#111"/>
    <g class="leg-ul"><line x1="24" y1="50" x2="10" y2="42" stroke="#111" stroke-width="3" stroke-linecap="round"/></g>
    <g class="leg-ur"><line x1="56" y1="50" x2="70" y2="42" stroke="#111" stroke-width="3" stroke-linecap="round"/></g>
    <g class="leg-ml"><line x1="22" y1="61" x2="7" y2="61" stroke="#111" stroke-width="3" stroke-linecap="round"/></g>
    <g class="leg-mr"><line x1="58" y1="61" x2="73" y2="61" stroke="#111" stroke-width="3" stroke-linecap="round"/></g>
    <g class="leg-ll"><line x1="25" y1="72" x2="11" y2="81" stroke="#111" stroke-width="3" stroke-linecap="round"/></g>
    <g class="leg-lr"><line x1="55" y1="72" x2="69" y2="81" stroke="#111" stroke-width="3" stroke-linecap="round"/></g>
    <g class="bug-shell">
      <rect x="26" y="13" width="28" height="27" rx="9" ry="9" fill="#151515"/>
      <circle cx="34" cy="25" r="4.7" fill="#f8fbff"/>
      <circle cx="46" cy="25" r="4.7" fill="#f8fbff"/>
      <circle cx="35.4" cy="26.2" r="2" fill="#151515"/>
      <circle cx="47.4" cy="26.2" r="2" fill="#151515"/>
      <path d="M35 33 Q40 36 45 33" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
      <ellipse cx="40" cy="61" rx="24" ry="22" fill="url(#sg-p)"/>
      <path d="M40 39 C38 52 38 67 40 83" stroke="#111" stroke-width="2.2" opacity="0.6" fill="none"/>
      ${makeBugDots().map(d=>`<circle cx="${d.x}" cy="${d.y}" r="${d.r}" fill="#000" opacity="0.52"/>`).join('')}
    </g>
    ${activity.prop}
  </g>
  ${extraSVG}
</svg>`;
}

function render() {
    const a = ACTIVITIES[current];
    document.getElementById('anim-label').textContent = a.label;
    document.getElementById('anim-counter').textContent = (current + 1) + ' / ' + ACTIVITIES.length;
    document.getElementById('bug-slot').innerHTML = makeBugSVG(a);
}
function next() { current = (current + 1) % ACTIVITIES.length; render(); }
function prev() { current = (current - 1 + ACTIVITIES.length) % ACTIVITIES.length; render(); }
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight') next(); if (e.key === 'ArrowLeft') prev(); });
render();
</script>
</body>
</html>
