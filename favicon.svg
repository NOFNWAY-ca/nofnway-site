<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Diamond shape: points at top/right/bottom/left edges with padding -->
  <polygon points="50,4 96,50 50,96 4,50" fill="#0057B8"/>
  <!-- FN: Impact, baseline set so cap-height visually centres at y=50 -->
  <text x="50" y="64"
        text-anchor="middle"
        font-family="Impact, 'Arial Narrow', sans-serif"
        font-size="40"
        fill="white"
        stroke="white"
        stroke-width="3"
        paint-order="stroke fill">FN</text>
</svg>
