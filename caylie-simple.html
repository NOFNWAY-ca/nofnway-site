<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caylie Planner — Simple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#2E3192;--sky:#00AEEF;--bg:#f4f7fb;--card:#fff;--muted:#667085;--line:#d8e1ee;}
    *{box-sizing:border-box} body{margin:0;font-family:'Source Sans 3',sans-serif;background:var(--bg);color:#1f2937}
    .container{max-width:1100px;margin:0 auto;padding:16px}
    h1,h2,h3{font-family:Oswald,sans-serif;letter-spacing:.3px;margin:.2rem 0}
    .header{background:linear-gradient(120deg,var(--navy),#4047af);color:#fff;padding:16px;border-radius:16px}
    .notice{background:#fff7e6;color:#7a5400;padding:8px 12px;border-radius:10px;font-size:.95rem;margin-top:10px;border:1px solid #ffd58a}
    .totals{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px;margin:14px 0}
    .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}
    .stat b{display:block;color:var(--navy);font-size:1.3rem}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
    .grid{display:grid;gap:12px}
    .form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    label{font-weight:600;font-size:.95rem}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;padding:10px;border:1px solid #c8d2e2;border-radius:10px;background:#fff}
    textarea{min-height:86px}
    button{padding:10px 14px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-weight:700;cursor:pointer;min-height:42px}
    button.alt{background:var(--sky);color:#00344a}
    button.ghost{background:#eef2ff;color:var(--navy)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .badge{padding:4px 8px;border-radius:999px;font-size:.8rem;font-weight:700;color:#fff}
    .Estimate{background:#64748b}.Scheduled{background:#0ea5e9}.Active{background:#f59e0b}.Complete{background:#16a34a}
    .tag{padding:3px 8px;border-radius:999px;background:#dff6ff;color:#05556e;font-size:.78rem;font-weight:700}
    .jobs{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-top:12px}
    .toast{position:fixed;right:14px;bottom:14px;background:#111827;color:#fff;padding:10px 12px;border-radius:10px;opacity:0;transform:translateY(8px);transition:.2s}
    .toast.show{opacity:1;transform:none}
    @media(max-width:850px){.form-grid,.totals{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.form-grid,.totals{grid-template-columns:1fr}.container{padding:10px}}
    @media print{button,.notice{display:none!important}.header{background:#fff;color:#000;border:1px solid #ccc}body{background:#fff}.print-head{display:block!important}}
    .print-head{display:none;font-family:Oswald,sans-serif;margin-bottom:10px}
  </style>
</head>
<body>
  <main class="container">
    <div class="print-head">Caylie Wiebe · Student Works Painting · <span id="printDate"></span></div>
    <section class="header">
      <h1>Caylie Job Tracker — Simple</h1>
      <div class="notice">Data is not saved between sessions.</div>
    </section>
    <section class="totals" id="totals"></section>

    <section class="card">
      <h2>Add Job</h2>
      <form id="jobForm" class="grid">
        <div class="form-grid">
          <div><label>Name<input required name="name"></label></div>
          <div><label>Address<input required name="address"></label></div>
          <div><label>Value (CAD)<input required type="number" min="0" step="50" name="value"></label></div>
          <div><label>Start date<input required type="date" name="startDate"></label></div>
          <div><label>Status<select name="status"><option>Estimate</option><option>Scheduled</option><option>Active</option><option>Complete</option></select></label></div>
          <div><label>Crew<input name="crew" placeholder="Jake + Priya"></label></div>
        </div>
        <label><input type="checkbox" name="discount"> 10% discount applied</label>
        <div><button type="submit">Add Job</button></div>
      </form>
    </section>

    <section class="jobs" id="jobs"></section>
  </main>
  <div class="toast" id="toast"></div>
<script>
const order=['Estimate','Scheduled','Active','Complete'];
const seed=[
{id:crypto.randomUUID(),name:'Friesen Home',address:'88 Maple Dr, Steinbach',status:'Active',progress:65,value:2100,crew:'Jake + Priya',startDate:'2026-04-10',discount:false,note:''},
{id:crypto.randomUUID(),name:'Wall Garage & House',address:'15 Prairie Ave, Mitchell',status:'Active',progress:30,value:4400,crew:'Sam + Lexi',startDate:'2026-04-08',discount:true,note:''},
{id:crypto.randomUUID(),name:'Penner Property',address:'42 Oak Cres, Steinbach',status:'Scheduled',progress:0,value:3200,crew:'Jake + Priya',startDate:'2026-04-15',discount:false,note:''},
{id:crypto.randomUUID(),name:'Reimer Residence',address:'77 Elm Blvd, Grunthal',status:'Scheduled',progress:0,value:2600,crew:'Sam + Lexi',startDate:'2026-04-22',discount:false,note:''},
{id:crypto.randomUUID(),name:'McMahon Residence',address:'610 Hanover St, Steinbach',status:'Estimate',progress:0,value:2850,crew:'',startDate:'2026-04-13',discount:false,note:''},
{id:crypto.randomUUID(),name:'Dyck Duplex',address:'231 First St, Steinbach',status:'Complete',progress:100,value:1950,crew:'Jake + Priya',startDate:'2026-04-01',discount:false,note:''}
];
let jobs=structuredClone(seed);
const $=(s)=>document.querySelector(s);
function money(n){return new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',maximumFractionDigits:0}).format(n)}
function fmt(d){return new Date(d+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'})}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1400)}
function renderTotals(){
  const t=[['Total jobs',jobs.length],['Active',jobs.filter(j=>j.status==='Active').length],['Completed',jobs.filter(j=>j.status==='Complete').length],['Season value',money(jobs.reduce((a,b)=>a+b.value,0))]];
  $('#totals').innerHTML=t.map(([k,v])=>`<div class="stat"><span>${k}</span><b>${v}</b></div>`).join('');
}
function nextStatus(s){return order[(order.indexOf(s)+1)%order.length]}
function renderJobs(){
  const wrap=$('#jobs'); wrap.innerHTML='';
  jobs.forEach(j=>{
    const card=document.createElement('article');card.className='card';
    card.innerHTML=`<div class="row"><h3>${j.name}</h3><span class="badge ${j.status}">${j.status}</span>${j.discount?'<span class="tag">10% discount</span>':''}</div>
    <div>${j.address}</div><div class="row"><strong>${money(j.value)}</strong><span>${j.crew||'No crew assigned'}</span><span>Start ${fmt(j.startDate)}</span></div>`;
    const actions=document.createElement('div');actions.className='row';
    const cycle=document.createElement('button');cycle.className='ghost';cycle.textContent='Cycle Status';cycle.onclick=()=>{j.status=nextStatus(j.status);if(j.status==='Complete')j.progress=100;render();toast('Status updated')};
    const del=document.createElement('button');del.className='alt';del.textContent='Delete';del.onclick=()=>{if(confirm(`Delete ${j.name}?`)){jobs=jobs.filter(x=>x.id!==j.id);render();toast('Job deleted')}};
    actions.append(cycle,del);card.append(actions);
    if(j.status==='Active'){
      const note=document.createElement('div');note.innerHTML=`<label>Daily note<textarea placeholder="Today's update..."></textarea></label>`;
      const ta=note.querySelector('textarea');ta.value=j.note||'';ta.oninput=()=>j.note=ta.value;
      card.append(note);
    }
    wrap.append(card);
  });
}
function render(){renderTotals();renderJobs();$('#printDate').textContent=new Date().toLocaleDateString('en-CA')}
$('#jobForm').addEventListener('submit',e=>{
  e.preventDefault();const f=new FormData(e.target);
  jobs.unshift({id:crypto.randomUUID(),name:f.get('name').trim(),address:f.get('address').trim(),value:Number(f.get('value')||0),startDate:f.get('startDate'),status:f.get('status'),crew:f.get('crew').trim(),discount:f.get('discount')==='on',progress:f.get('status')==='Complete'?100:0,note:''});
  e.target.reset();render();toast('Job added');
});
render();
</script>
</body>
</html>
