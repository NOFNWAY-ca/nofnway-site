<!doctype html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Caylie Planner — Standard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#2E3192;--sky:#00AEEF;--bg:#f3f7fc;--line:#d6dfec}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:'Source Sans 3',sans-serif;color:#1f2937}
header{background:linear-gradient(120deg,var(--navy),#4248a8);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10}h1,h2,h3{font-family:Oswald,sans-serif;margin:.2rem 0}
.wrap{max-width:1150px;margin:auto;padding:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{background:#fff;color:var(--navy);border:none;padding:10px 14px;border-radius:10px;font-weight:700;min-height:42px;cursor:pointer}.tabs button.on{background:var(--sky);color:#003a4f}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.grid{display:grid;gap:12px}.jobs{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.badge{padding:3px 8px;border-radius:999px;color:#fff;font-size:.78rem;font-weight:700}.Estimate{background:#64748b}.Scheduled{background:#0ea5e9}.Active{background:#f59e0b}.Complete{background:#16a34a}
input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:9px;border:1px solid #c8d2e2;border-radius:10px}button{padding:9px 12px;border:none;border-radius:10px;background:var(--navy);color:#fff;cursor:pointer;min-height:40px}button.alt{background:var(--sky);color:#003548}button.ghost{background:#eef2ff;color:var(--navy)}
.form{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.stats{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:8px}.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}.stat b{display:block;color:var(--navy);font-size:1.2rem}
.small{font-size:.9rem;color:#667085}.hidden{display:none!important}.modal{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;padding:12px}.modal.open{display:flex}.modal .card{width:min(680px,100%)}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:8px;border-bottom:1px solid #e5ebf4;text-align:left}.thbtn{background:none;border:none;color:var(--navy);padding:0;font-weight:700}
.toast{position:fixed;right:12px;bottom:12px;background:#111827;color:#fff;padding:10px;border-radius:10px;opacity:0;transition:.2s}.toast.show{opacity:1}
#settingsBtn{float:right;background:#fff;color:var(--navy)}footer{text-align:center;color:#667085;margin:16px 0}
@media(max-width:820px){.form,.stats{grid-template-columns:1fr 1fr}}@media(max-width:560px){.form,.stats{grid-template-columns:1fr}}
@media print{header,.tabs,button,.no-print,footer{display:none!important}body{background:#fff}.print-head{display:block!important}.card{break-inside:avoid}}
.print-head{display:none;font-family:Oswald,sans-serif;margin:0 0 10px}
</style></head><body>
<header><h1 style="display:inline">Caylie Job Tracker — Standard</h1><button id="settingsBtn" title="Settings">⚙</button><div class="tabs" style="margin-top:8px"><button class="on" data-tab="jobs">Jobs</button><button data-tab="reports">Reports</button><button data-tab="checklists">Checklists</button><button data-tab="season">Season</button></div></header>
<main class="wrap"><div class="print-head">Caylie Wiebe · Student Works Painting · <span id="printDate"></span></div>
<section id="jobs" class="tab">
<div class="card"><h2>Add Job</h2><form id="addForm" class="grid"><div class="form">
<label>Name<input name="name" required></label><label>Address<input name="address" required></label><label>Value<input name="value" required type="number"></label>
<label>Start date<input name="startDate" required type="date"></label><label>Status<select name="status"><option>Estimate</option><option>Scheduled</option><option>Active</option><option>Complete</option></select></label><label>Crew<input name="crew"></label>
</div><label><input type="checkbox" name="discount"> 10% discount</label><button>Add Job</button></form></div>
<div class="grid jobs" id="jobCards"></div></section>
<section id="reports" class="tab hidden"></section>
<section id="checklists" class="tab hidden"></section>
<section id="season" class="tab hidden"></section>
<footer>Built by Before It Breaks · beforeitbreaks.ca</footer></main>
<div class="modal" id="editModal"><div class="card"><h3>Edit Job</h3><form id="editForm" class="grid"><input type="hidden" name="id"><div class="form">
<label>Name<input name="name" required></label><label>Address<input name="address" required></label><label>Value<input name="value" type="number" required></label>
<label>Start date<input name="startDate" type="date" required></label><label>Status<select name="status"><option>Estimate</option><option>Scheduled</option><option>Active</option><option>Complete</option></select></label><label>Crew<input name="crew"></label>
</div><label><input type="checkbox" name="discount"> 10% discount</label><div class="row"><button>Save</button><button type="button" class="ghost" id="closeModal">Cancel</button></div></form></div></div>
<div class="modal" id="settingsModal"><div class="card"><h3>Settings</h3><form id="settingsForm" class="grid"><div class="form">
<label>Operator<input name="operator"></label><label>Phone<input name="phone"></label><label>Territory<input name="territory"></label><label>Season year<input name="year" type="number"></label>
</div><div class="row"><button>Save Settings</button><button type="button" class="alt" id="clearData">Clear all data</button><button type="button" class="ghost" id="closeSettings">Close</button></div></form></div></div>
<div class="toast" id="toast"></div>
<script>
const KEY='sw_caylie_standard',S=['Estimate','Scheduled','Active','Complete'];
const seedJobs=[['Friesen Home','88 Maple Dr, Steinbach','Active',65,2100,'Jake + Priya','2026-04-10',false],['Wall Garage & House','15 Prairie Ave, Mitchell','Active',30,4400,'Sam + Lexi','2026-04-08',true],['Penner Property','42 Oak Cres, Steinbach','Scheduled',0,3200,'Jake + Priya','2026-04-15',false],['Reimer Residence','77 Elm Blvd, Grunthal','Scheduled',0,2600,'Sam + Lexi','2026-04-22',false],['McMahon Residence','610 Hanover St, Steinbach','Estimate',0,2850,'','2026-04-13',false],['Dyck Duplex','231 First St, Steinbach','Complete',100,1950,'Jake + Priya','2026-04-01',false]];
const PRE=['Drop cloths down','Furniture moved/covered','Paint confirmed with client','Primer applied if needed','Trim taped','Equipment staged'];
const END=['All surfaces covered evenly','Edges and trim clean','Hardware reattached','Full cleanup done','Walk-through completed with client','Client satisfied'];
let state=JSON.parse(localStorage.getItem(KEY)||'null')||{jobs:seedJobs.map(x=>({id:crypto.randomUUID(),name:x[0],address:x[1],status:x[2],progress:x[3],value:x[4],crew:x[5],startDate:x[6],discount:x[7]})),reports:{},checklists:{},settings:{operator:'Caylie Wiebe',phone:'204-381-2153',territory:'Steinbach, Manitoba',year:2026},sort:{key:'name',dir:1}};
const $=s=>document.querySelector(s);const money=n=>new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',maximumFractionDigits:0}).format(n);const dt=d=>new Date(d+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'});const today=()=>new Date().toISOString().slice(0,10);
function save(){localStorage.setItem(KEY,JSON.stringify(state))}function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1300)}
function tab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.add('hidden'));$('#'+id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));render()}
function cycle(st){return S[(S.indexOf(st)+1)%S.length]}function reportKey(id,date){return id+'|'+date}
function renderJobs(){const w=$('#jobCards');w.innerHTML='';state.jobs.forEach(j=>{const a=document.createElement('article');a.className='card';a.innerHTML=`<div class=row><h3>${j.name}</h3><span class='badge ${j.status}'>${j.status}</span>${j.discount?'<span class=small>10% discount</span>':''}</div><div>${j.address}</div><div class=row><strong>${money(j.value)}</strong><span>${j.crew||'No crew assigned'}</span><span>${dt(j.startDate)}</span></div>`;
if(j.status==='Active'){const p=document.createElement('label');p.textContent='Progress '+j.progress+'%';const r=document.createElement('input');r.type='range';r.min=0;r.max=100;r.value=j.progress;r.oninput=()=>{j.progress=+r.value;p.firstChild.textContent='Progress '+j.progress+'%';save()};p.append(r);a.append(p)}
const row=document.createElement('div');row.className='row';[['Cycle',()=>{j.status=cycle(j.status);if(j.status==='Complete')j.progress=100;save();render();toast('Status updated')}],['Edit',()=>openEdit(j)],['Delete',()=>{if(confirm('Delete '+j.name+'?')){state.jobs=state.jobs.filter(x=>x.id!==j.id);save();render();toast('Job deleted')}}]].forEach(([t,fn],i)=>{const b=document.createElement('button');b.className=i? 'ghost':'';b.textContent=t;b.onclick=fn;row.append(b)});a.append(row);w.append(a)})}
function renderReports(){const active=state.jobs.filter(j=>j.status==='Active');$('#reports').innerHTML='<h2>Daily Reports</h2>'+(active.length?'':'<p class=small>No active jobs.</p>');active.forEach(j=>{const key=reportKey(j.id,today()),has=!!state.reports[key];const card=document.createElement('article');card.className='card';card.innerHTML=`<div class=row><h3>${j.name}</h3><span class='badge Active'>${has?'Today filed':'Missing today'}</span></div><label>Date <input type=date value='${today()}'></label><details><summary>Open report</summary></details>`;
const d=card.querySelector('details'),dateInput=card.querySelector('input');
function draw(){const k=reportKey(j.id,dateInput.value),r=state.reports[k]||{checks:{},notes:''};d.innerHTML='<summary>Open report</summary>'+['Masking & prep done','Paint applied','Second coat done','Cleanup complete','Client called','On track to finish'].map(it=>`<label><input type=checkbox ${r.checks[it]?'checked':''} data-i='${it}'> ${it}</label>`).join('')+`<label>Notes<textarea>${r.notes||''}</textarea></label><div class=row><button class=save>Save report</button><button class=ghost print>Print</button></div>`;
 d.querySelectorAll('input[type=checkbox]').forEach(c=>c.onchange=()=>{r.checks[c.dataset.i]=c.checked});d.querySelector('textarea').oninput=e=>r.notes=e.target.value;d.querySelector('.save').onclick=()=>{state.reports[k]=r;save();renderReports();toast('Report saved')};d.querySelector('.print').onclick=()=>printInternal(j,dateInput.value,r)}
 dateInput.onchange=draw;draw();$('#reports').append(card)})}
function printInternal(j,date,r){const list=Object.entries(r.checks||{}).filter(([,v])=>v).map(([k])=>k).join(', ')||'None selected';const w=window.open('','_blank');w.document.write(`<h2>${j.name}</h2><p>${j.address}</p><p>${date}</p><p>${list}</p><p>${(r.notes||'').replace(/</g,'&lt;')}</p><p>Caylie Wiebe · Student Works Painting · 204-381-2153</p><style>body{font-family:Arial;padding:18px;color:#000}</style>`);w.print();}
function renderChecklists(){const sec=$('#checklists');sec.innerHTML='<h2>Checklists</h2>';state.jobs.forEach(j=>{const c=state.checklists[j.id]||(state.checklists[j.id]={pre:{},end:{}});const card=document.createElement('article');card.className='card';card.innerHTML=`<h3>${j.name}</h3><div class=form><div><h4>Pre-job</h4>${PRE.map(i=>`<label><input type=checkbox data-t='pre' data-i='${i}' ${c.pre[i]?'checked':''}> ${i}</label>`).join('')}</div><div><h4>End-of-job</h4>${END.map(i=>`<label><input type=checkbox data-t='end' data-i='${i}' ${c.end[i]?'checked':''}> ${i}</label>`).join('')}<div class='row'><button class='print'>Print End Checklist</button></div></div></div>`;
card.querySelectorAll('input[type=checkbox]').forEach(box=>box.onchange=()=>{c[box.dataset.t][box.dataset.i]=box.checked;save()});card.querySelector('.print').onclick=()=>{const done=END.filter(i=>c.end[i]);const w=window.open('','_blank');w.document.write(`<h2>${j.name} End-of-Job Checklist</h2><ul>${done.map(i=>`<li>${i}</li>`).join('')}</ul><style>body{font-family:Arial;padding:18px}</style>`);w.print()};sec.append(card)});save()}
function renderSeason(){const sec=$('#season'),jobs=[...state.jobs].sort((a,b)=>{const k=state.sort.key,dir=state.sort.dir;let va=a[k],vb=b[k];if(k==='value')return dir*(va-vb);if(k==='startDate')return dir*(va.localeCompare(vb));return dir*String(va).localeCompare(String(vb));});const filed=state.jobs.filter(j=>state.reports[reportKey(j.id,today())]).length;
sec.innerHTML=`<div class=stats>${[['Total jobs',state.jobs.length],['Active',state.jobs.filter(x=>x.status==='Active').length],['Scheduled',state.jobs.filter(x=>x.status==='Scheduled').length],['Complete',state.jobs.filter(x=>x.status==='Complete').length],['Total season value',money(state.jobs.reduce((a,b)=>a+b.value,0))],['Earned to date',money(state.jobs.filter(x=>x.status==='Complete').reduce((a,b)=>a+b.value,0))],['Reports filed today',filed]].map(([k,v])=>`<div class=stat>${k}<b>${v}</b></div>`).join('')}</div>
<div class=card><h2>Jobs Table</h2><table class=table><thead><tr>${[['name','Name'],['value','Value'],['status','Status'],['startDate','Date']].map(([k,l])=>`<th><button class=thbtn data-k=${k}>${l}</button></th>`).join('')}<th>Crew</th></tr></thead><tbody>${jobs.map(j=>`<tr><td>${j.name}</td><td>${money(j.value)}</td><td>${j.status}</td><td>${j.startDate}</td><td>${j.crew||'-'}</td></tr>`).join('')}</tbody></table></div>`;
sec.querySelectorAll('.thbtn').forEach(b=>b.onclick=()=>{state.sort.dir=state.sort.key===b.dataset.k?-state.sort.dir:1;state.sort.key=b.dataset.k;save();renderSeason()})}
function render(){renderJobs();renderReports();renderChecklists();renderSeason();$('#printDate').textContent=new Date().toLocaleDateString('en-CA')}
function openEdit(j){$('#editModal').classList.add('open');const f=$('#editForm');Object.entries(j).forEach(([k,v])=>f.elements[k]&&(f.elements[k].type==='checkbox'?f.elements[k].checked=v:f.elements[k].value=v));}
$('#closeModal').onclick=()=>$('#editModal').classList.remove('open');$('#closeSettings').onclick=()=>$('#settingsModal').classList.remove('open');$('#settingsBtn').onclick=()=>{$('#settingsModal').classList.add('open');const f=$('#settingsForm');Object.entries(state.settings).forEach(([k,v])=>f.elements[k].value=v)}
$('#addForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);state.jobs.unshift({id:crypto.randomUUID(),name:f.get('name'),address:f.get('address'),value:+f.get('value'),startDate:f.get('startDate'),status:f.get('status'),crew:f.get('crew'),discount:f.get('discount')==='on',progress:f.get('status')==='Active'?0:(f.get('status')==='Complete'?100:0)});save();e.target.reset();render();toast('Job added')};
$('#editForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),j=state.jobs.find(x=>x.id===f.get('id'));if(!j)return;['name','address','startDate','status','crew'].forEach(k=>j[k]=f.get(k));j.value=+f.get('value');j.discount=f.get('discount')==='on';if(j.status==='Complete')j.progress=100;save();$('#editModal').classList.remove('open');render();toast('Job saved')};
$('#settingsForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);state.settings={operator:f.get('operator'),phone:f.get('phone'),territory:f.get('territory'),year:+f.get('year')};save();$('#settingsModal').classList.remove('open');toast('Settings saved')}
$('#clearData').onclick=()=>{if(confirm('Clear all saved data?')){localStorage.removeItem(KEY);location.reload()}};document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>tab(b.dataset.tab));render();
</script></body></html>
