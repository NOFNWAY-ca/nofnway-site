<script>

// ── UNIT DATA ─────────────────────────────────────

const UnitData = {
    weight:   { lb:1, kg:0.453592, oz:16, g:453.592, st:0.0714286 },
    length:   { in:1, ft:1/12, yd:1/36, mi:1/63360, mm:25.4, cm:2.54, m:0.0254, km:1/39370 },
    volume:   { tsp:48, tbsp:16, floz:8, cup:1, pt:0.5, qt:0.25, gal:0.0625, ml:236.588, l:0.236588 },
    pressure: { psi:1, bar:0.0689476, kpa:6.89476 }
};

// ── UNIT ALIASES ─────────────────────────────────

const UnitAliases = {
    kg: ['kg','kgs','kilogram','kilograms'],
    lb: ['lb','lbs','pound','pounds'],
    m:  ['m','meter','meters'],
    km: ['km','kilometer','kilometers'],
    cm: ['cm','centimeter','centimeters'],
    mm: ['mm','millimeter','millimeters']
};

function normalizeUnit(input) {
    for (const key in UnitAliases) {
        if (UnitAliases[key].includes(input)) return key;
    }
    return input;
}

// ── PARSER ──────────────────────────────────────

function parseInput(raw) {
    const match = raw.match(/^(-?\d+(\.\d+)?)([a-zA-Z]+)$/);
    if (!match) return { error: 'Invalid format' };
    return { value: parseFloat(match[1]), unit: match[3].toLowerCase() };
}

// ── RESOLVE ─────────────────────────────────────

function resolveUnit(unit) {
    unit = normalizeUnit(unit);
    for (const cat in UnitData) {
        if (UnitData[cat][unit] !== undefined) {
            return { category: cat, unit };
        }
    }
    return { error: 'Unknown unit' };
}

// ── CONVERT ─────────────────────────────────────

function convertValue(val, unit, cat) {
    const base = val / UnitData[cat][unit];
    const out = [];
    for (const u in UnitData[cat]) {
        if (u === unit) continue;
        out.push({ unit: u, value: base * UnitData[cat][u] });
    }
    return out;
}

// ── FORMAT ──────────────────────────────────────

function format(val) {
    if (Math.abs(val) < 1)   return val.toFixed(4);
    if (Math.abs(val) < 100) return val.toFixed(2);
    return Math.round(val).toString();
}

// ── RENDER ──────────────────────────────────────

const resultsEl = document.getElementById('results');
const errorEl   = document.getElementById('error');
const boxEl     = document.getElementById('box');

function render(state) {
    resultsEl.textContent = '';
    errorEl.textContent = '';
    boxEl.classList.remove('error', 'active');

    if (state.error) {
        errorEl.textContent = state.error;
        boxEl.classList.add('error');
        return;
    }

    if (!state.results) return;

    boxEl.classList.add('active');

    state.results.forEach(r => {
        const card = document.createElement('div');
        card.className = 'result-card';

        const unitEl = document.createElement('div');
        unitEl.textContent = r.unit;

        const valEl = document.createElement('div');
        valEl.textContent = format(r.value);

        card.appendChild(unitEl);
        card.appendChild(valEl);
        card.addEventListener('click', () => copy(r.value, r.unit));
        resultsEl.appendChild(card);
    });
}

// ── COPY ────────────────────────────────────────

const toastEl = document.getElementById('toast');
let toastTimer = null;

async function copy(val, unit) {
    const text = `${format(val)} ${unit}`;
    try {
        await navigator.clipboard.writeText(text);
    } catch(_) {
        // Clipboard unavailable — skip silently
    }
    clearTimeout(toastTimer);
    toastEl.textContent = `${text} copied`;
    toastEl.style.display = 'block';
    toastTimer = setTimeout(() => { toastEl.style.display = 'none'; }, 1500);
}

// ── CONTROLLER ──────────────────────────────────

let lastUnit = null;

function handleInput() {
    const raw = document.getElementById('userInput').value.trim().toLowerCase();
    if (!raw) { render({}); return; }

    // Sticky unit — if the user types a bare number, reuse the last unit
    if (/^\d+(\.\d+)?$/.test(raw) && lastUnit) {
        return process(raw + lastUnit);
    }

    process(raw);
}

function process(raw) {
    const parsed = parseInput(raw);
    if (parsed.error) return render(parsed);

    const resolved = resolveUnit(parsed.unit);
    if (resolved.error) return render(resolved);

    lastUnit = resolved.unit;
    render({ results: convertValue(parsed.value, resolved.unit, resolved.category) });
}

// ── EVENTS ──────────────────────────────────────

document.getElementById('userInput').addEventListener('input', handleInput);

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.getElementById('userInput').value = '';
        render({});
    }
});

</script>
