<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOW [FN] MUCH? – NOFNWAY</title>

<link rel="stylesheet" href="theme.css">

<style>
:root {
    --accent-yellow: #facc15;
    --accent-green:  #4ade80;
    --accent-red:    #f87171;
}

body { height: 100vh; display:flex; flex-direction:column; overflow:hidden; }

.workspace {
    flex:1; overflow-y:auto; padding:1rem;
    max-width:600px; margin:0 auto; width:100%;
}

.hero-title { text-align:center; }
#dynamic-title {
    font-family:Montserrat, sans-serif;
    font-weight:900;
    font-size:3rem;
}

.input-container {
    border:3px solid var(--border);
    border-radius:1rem;
    padding:1rem;
    margin:1rem 0;
    transition:0.2s;
}

.input-container.active { border-color:var(--brand); }
.input-container.error  { border-color:var(--accent-red); }

.main-input {
    width:100%;
    border:none;
    font-size:2.5rem;
    text-align:center;
    background:transparent;
    outline:none;
}

.results-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.result-card {
    padding:1rem;
    border-radius:0.75rem;
    border-left:5px solid var(--brand);
    cursor:pointer;
}

.toast {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 20px;
    background:var(--accent-green);
    display:none;
}

.error-msg {
    text-align:center;
    color:var(--accent-red);
    font-size:0.8rem;
}
</style>
</head>

<body>

<main class="workspace">

<h1 id="dynamic-title">HOW MUCH?</h1>

<div id="box" class="input-container">
    <input id="userInput" class="main-input"
        placeholder="e.g. 10kg"
        autofocus>
</div>

<div id="error" class="error-msg"></div>
<div id="results" class="results-grid"></div>

</main>

<div id="toast" class="toast"></div>

<script>

// ── UNIT DATA ─────────────────────────────────────

const UnitData = {
    weight: { lb:1, kg:0.453592, oz:16, g:453.592, st:0.0714286 },
    length: { in:1, ft:1/12, yd:1/36, mi:1/63360, mm:25.4, cm:2.54, m:0.0254, km:1/39370 },
    volume: { tsp:48, tbsp:16, floz:8, cup:1, pt:0.5, qt:0.25, gal:0.0625, ml:236.588, l:0.236588 },
    pressure:{ psi:1, bar:0.0689476, kpa:6.89476 }
};

// ── UNIT ALIASES ─────────────────────────────────

const UnitAliases = {
    kg:['kg','kgs','kilogram','kilograms'],
    lb:['lb','lbs','pound','pounds'],
    m:['m','meter','meters'],
    km:['km','kilometer','kilometers'],
    cm:['cm','centimeter','centimeters'],
    mm:['mm','millimeter','millimeters']
};

function normalizeUnit(input) {
    for (const key in UnitAliases) {
        if (UnitAliases[key].includes(input)) return key;
    }
    return input;
}

// ── PARSER ──────────────────────────────────────

function parseInput(raw) {
    const match = raw.match(/^(-?\d+(\.\d+)?)([a-zA-Z]+)$/);
    if (!match) return { error:"Invalid format" };

    return {
        value: parseFloat(match[1]),
        unit: match[3].toLowerCase()
    };
}

// ── RESOLVE ─────────────────────────────────────

function resolveUnit(unit) {
    unit = normalizeUnit(unit);

    for (const cat in UnitData) {
        if (UnitData[cat][unit]) {
            return { category:cat, unit };
        }
    }
    return { error:"Unknown unit" };
}

// ── CONVERT ─────────────────────────────────────

function convertValue(val, unit, cat) {
    const base = val / UnitData[cat][unit];
    const out = [];

    for (const u in UnitData[cat]) {
        if (u === unit) continue;
        out.push({
            unit:u,
            value: base * UnitData[cat][u]
        });
    }
    return out;
}

// ── FORMAT ──────────────────────────────────────

function format(val) {
    if (Math.abs(val) < 1) return val.toFixed(4);
    if (Math.abs(val) < 100) return val.toFixed(2);
    return Math.round(val);
}

// ── RENDER ──────────────────────────────────────

function render(state) {
    const results = document.getElementById('results');
    const error   = document.getElementById('error');
    const box     = document.getElementById('box');

    results.innerHTML = '';
    error.textContent = '';
    box.classList.remove('error','active');

    if (state.error) {
        error.textContent = state.error;
        box.classList.add('error');
        return;
    }

    box.classList.add('active');

    state.results.forEach(r => {
        const div = document.createElement('div');
        div.className = 'result-card';
        div.innerHTML = `
            <div>${r.unit}</div>
            <div>${format(r.value)}</div>
        `;
        div.onclick = () => copy(r.value, r.unit);
        results.appendChild(div);
    });
}

// ── COPY ────────────────────────────────────────

function copy(val, unit) {
    const text = `${val} ${unit}`;
    navigator.clipboard.writeText(text);

    const toast = document.getElementById('toast');
    toast.textContent = `${text} copied`;
    toast.style.display = 'block';

    setTimeout(()=>toast.style.display='none',1500);
}

// ── CONTROLLER ──────────────────────────────────

let lastUnit = null;

function handleInput() {
    const raw = document.getElementById('userInput').value.trim().toLowerCase();

    if (!raw) return render({});

    // sticky unit
    if (/^\d+$/.test(raw) && lastUnit) {
        return process(raw + lastUnit);
    }

    process(raw);
}

function process(raw) {
    const parsed = parseInput(raw);
    if (parsed.error) return render(parsed);

    const resolved = resolveUnit(parsed.unit);
    if (resolved.error) return render(resolved);

    lastUnit = resolved.unit;

    const results = convertValue(parsed.value, resolved.unit, resolved.category);

    render({ results });
}

// ── EVENTS ──────────────────────────────────────

document.getElementById('userInput').addEventListener('input', handleInput);

document.addEventListener('keydown', e=>{
    if (e.key === 'Escape') {
        document.getElementById('userInput').value='';
        render({});
    }
});

</script>

</body>
</html>
